<div class="manage-page">
  <h2>Item Management (Add / Edit / Delete)</h2>

  <div class="form-card">
    <input placeholder="Item ID" type="number" class="input">
    <input placeholder="Name" class="input">
    <select class="input">
      <option>Electronics</option>
      <option>Furniture</option>
      <option>Clothing</option>
    </select>
    <input placeholder="Quantity" type="number" class="input">
    <input placeholder="Price" type="number" class="input">
    <input placeholder="Supplier" class="input">
    <select class="input">
      <option>In Stock</option>
      <option>Low Stock</option>
    </select>
    <select class="input">
      <option>Hot: Yes</option>
      <option>Hot: No</option>
    </select>
    <textarea placeholder="Notes" class="input"></textarea>

    <div class="buttons">
      <button class="btn blue">Add Item</button>
      <button class="btn green">Update</button>
      <button class="btn orange">Delete</button>
    </div>
  </div>

  <div class="list">
    <div class="item"><strong>ID:</strong> 1 | <strong>Name:</strong> Laptop | <strong>Qty:</strong> 5</div>
  </div>
</div>
