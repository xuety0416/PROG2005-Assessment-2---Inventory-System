<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory System - Part1</title>
  <!-- 样式直接写在HTML里，100%生效 -->
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }
    body {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1rem;
      background-color: #f5f5f5;
    }
    h1 {
      margin-bottom: 1.5rem;
      color: #222;
    }
    .form-container {
      background-color: white;
      padding: 1.5rem;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      margin-bottom: 1.5rem;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    input, select {
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
    }
    .submit-btn {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 0.75rem;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }
    .submit-btn:hover {
      background-color: #0056b3;
    }
    .controls {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .controls button {
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 6px;
      background-color: #6c757d;
      color: white;
      cursor: pointer;
    }
    .controls button:hover {
      background-color: #5a6268;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .card {
      background-color: white;
      padding: 1.25rem;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .instock { color: #28a745; }
    .lowstock { color: #ffc107; }
    .outofstock { color: #dc3545; }
  </style>
</head>
<body>
  <h1>Inventory Management System (Part1)</h1>

  <div class="form-container">
    <form id="itemForm">
      <input type="text" id="itemId" placeholder="Item ID (unique)" required>
      <input type="text" id="itemName" placeholder="Item Name" required>
      <select id="category" required>
        <option value="Electronics">Electronics</option>
        <option value="Furniture">Furniture</option>
        <option value="Clothing">Clothing</option>
        <option value="Tools">Tools</option>
        <option value="Misc">Misc</option>
      </select>
      <input type="number" id="quantity" placeholder="Quantity" required min="0">
      <input type="number" id="price" placeholder="Price" required min="0">
      <input type="text" id="supplierName" placeholder="Supplier Name" required>
      <label><input type="checkbox" id="isPopular"> Popular Item</label>
      <input type="text" id="comment" placeholder="Comment (optional)">
      <button type="submit" class="submit-btn">Add Item</button>
    </form>
  </div>

  <div class="controls">
    <input type="text" id="searchName" placeholder="Search by name">
    <button onclick="searchItem()">Search</button>
    <button onclick="showPopular()">Show Popular</button>
    <button onclick="displayAllItems()">Show All</button>
  </div>

  <div id="output"></div>

  <script src="app.js"></script>
</body>
</html>
